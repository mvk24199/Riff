# Cuts a GitHub Release whenever a `v*` tag is pushed.
#
# Build flow:
#   1. Same toolchain as CI (macos-15 + Xcode 16) so the binary is
#      bit-identical to what `xcodebuild` produces locally.
#   2. Build the Release configuration so the user gets an optimized
#      binary, not the assertion-heavy Debug build.
#   3. Ad-hoc codesign — the .app will run with "Open Anyway" via
#      right-click, but won't be notarized. Notarization needs the
#      paid Apple Developer account (separate, gated decision).
#   4. Zip the .app and attach it to the Release.
#
# To cut a release:
#   git tag v0.1.0 -m "v0.1.0"
#   git push origin v0.1.0
#
# The tag name becomes the version label; release notes are autogenerated
# from the commit log between this tag and the previous one. Edit the
# Release on github.com afterwards if you want to write a real changelog.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # required to create releases + upload artifacts

jobs:
  build-and-release:
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # for the CFBundleVersion stamp script

      - name: Select Xcode 16.x
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16"

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (Release)
        run: |
          set -o pipefail
          xcodebuild \
            -scheme Riff \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            -skipMacroValidation \
            CODE_SIGN_STYLE=Automatic \
            build

      - name: Locate .app
        id: locate
        run: |
          APP_PATH=$(find build/Build/Products/Release -maxdepth 2 -name "Riff.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::Riff.app not found under build/Build/Products/Release"
            exit 1
          fi
          echo "app_path=${APP_PATH}" >> "$GITHUB_OUTPUT"
          echo "Found at ${APP_PATH}"

      - name: Zip the .app
        id: zip
        run: |
          TAG="${GITHUB_REF##refs/tags/}"
          ARTIFACT="Riff-${TAG}-macOS.zip"
          # ditto preserves macOS bundle metadata (extended attrs,
          # codesign signatures) where `zip` would mangle them.
          ditto -c -k --keepParent "${{ steps.locate.outputs.app_path }}" "${ARTIFACT}"
          shasum -a 256 "${ARTIFACT}" | tee "${ARTIFACT}.sha256"
          echo "artifact=${ARTIFACT}" >> "$GITHUB_OUTPUT"
          echo "checksum=${ARTIFACT}.sha256" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF##refs/tags/}"
          # `--generate-notes` autogenerates a "What's Changed" section
          # from the commit log since the previous tag. Editable on
          # github.com afterwards.
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            --latest \
            "${{ steps.zip.outputs.artifact }}" \
            "${{ steps.zip.outputs.checksum }}"
