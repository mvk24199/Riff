# XcodeGen project definition.
#
# Contributors run:
#   brew install xcodegen
#   xcodegen generate
#   open Riff.xcodeproj
#
# project.yml is the source of truth; Riff.xcodeproj is generated and
# .gitignored.

name: Riff
options:
  bundleIdPrefix: dev.riff
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  Riff:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources
        buildPhase: resources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleName: Riff
        CFBundleDisplayName: Riff
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSApplicationCategoryType: public.app-category.music
        NSHumanReadableCopyright: "© 2026. AGPL-3.0."
    entitlements:
      path: Sources/Riff.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.riff.app
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Sources/Riff.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    postCompileScripts:
      # Derive CFBundleVersion from `git rev-list --count HEAD` so each
      # commit increments the build number — required for TestFlight,
      # which rejects duplicate (CFBundleShortVersionString, CFBundleVersion)
      # pairs. Runs *after* Xcode's Info.plist processing copies the
      # plist into the .app bundle, *before* code signing — so signature
      # covers our stamp. Falls back to "1" outside a git checkout.
      - name: Sync CFBundleVersion to git rev-count
        script: |
          set -e
          PLIST="${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
          if [ ! -f "${PLIST}" ]; then
            echo "warning: ${PLIST} not present yet — skipping version stamp"
            exit 0
          fi
          if [ -d "${SRCROOT}/.git" ]; then
            BUILD_NUMBER=$(cd "${SRCROOT}" && git rev-list --count HEAD)
          else
            BUILD_NUMBER=1
          fi
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${BUILD_NUMBER}" "${PLIST}"
          echo "Stamped CFBundleVersion=${BUILD_NUMBER}"
        basedOnDependencyAnalysis: false

  RiffTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: Riff
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Riff.app/Contents/MacOS/Riff"
        GENERATE_INFOPLIST_FILE: YES
